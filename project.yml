name: Plat
options:
  bundleIdPrefix: Joshua-Cohen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Local.xcconfig is gitignored and supplies DEVELOPMENT_TEAM (and any other
# local-only overrides). Applied to every target's Debug + Release configs.
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.27.0"

targets:

  Plat:
    type: application
    platform: iOS
    scheme:
      testTargets: []
      gatherCoverageData: false
      configVariants: []
    sources:
      - Plat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Joshua-Cohen.Plat
        CODE_SIGN_ENTITLEMENTS: Plat/Plat.entitlements
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Plat uses your location to show the closest saved transit stops."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Allow background location so your widget stays accurate when you move between neighborhoods."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    info:
      path: Plat/Info.plist
      properties:
        UIBackgroundModes:
          - location
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - Joshua-Cohen.Plat.refresh
    dependencies:
      - target: PlatKit
        embed: true
      - target: PlatWidget
        embed: true
        codeSign: true

  PlatKit:
    type: framework
    platform: iOS
    sources:
      - PlatKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Joshua-Cohen.PlatKit
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
    dependencies:
      - package: SwiftProtobuf
        product: SwiftProtobuf

  PlatWidget:
    type: app-extension
    platform: iOS
    sources:
      - PlatWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Joshua-Cohen.Plat.widget
        CODE_SIGN_ENTITLEMENTS: PlatWidget/PlatWidget.entitlements
    info:
      path: PlatWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - target: PlatKit
        embed: false
