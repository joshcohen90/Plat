name: NextStop
options:
  bundleIdPrefix: Joshua-Cohen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Local.xcconfig is gitignored and supplies DEVELOPMENT_TEAM (and any other
# local-only overrides). Applied to every target's Debug + Release configs.
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1"

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.27.0"

targets:

  NextStop:
    type: application
    platform: iOS
    scheme:
      testTargets: []
      gatherCoverageData: false
      configVariants: []
    sources:
      - NextStop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Joshua-Cohen.NextStop
        CODE_SIGN_ENTITLEMENTS: NextStop/NextStop.entitlements
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "NextStop uses your location to show the closest saved transit stops."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Allow background location so your widget stays accurate when you move between neighborhoods."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    info:
      path: NextStop/Info.plist
      properties:
        UIBackgroundModes:
          - location
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - Joshua-Cohen.NextStop.refresh
    dependencies:
      - target: NextStopKit
        embed: true
      - target: NextStopWidget
        embed: true
        codeSign: true

  NextStopKit:
    type: framework
    platform: iOS
    sources:
      - NextStopKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Joshua-Cohen.NextStopKit
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
    dependencies:
      - package: SwiftProtobuf
        product: SwiftProtobuf

  NextStopWidget:
    type: app-extension
    platform: iOS
    sources:
      - NextStopWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Joshua-Cohen.NextStop.widget
        CODE_SIGN_ENTITLEMENTS: NextStopWidget/NextStopWidget.entitlements
    info:
      path: NextStopWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - target: NextStopKit
        embed: false
